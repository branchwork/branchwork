# One-command self-hosted deploy:
#   docker compose up -d
#
# Dashboard at http://localhost:3100

services:
  branchwork:
    image: ghcr.io/branchwork/branchwork:${BRANCHWORK_VERSION:-0.3.0}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${BRANCHWORK_PORT:-3100}:3100"
    volumes:
      - branchwork-data:/data
    environment:
      - BRANCHWORK_WEBHOOK_URL=${BRANCHWORK_WEBHOOK_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  branchwork-data:
