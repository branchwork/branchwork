# Managed SaaS deployment with Postgres:
#   docker compose -f docker-compose.yml -f docker-compose.saas.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: orchestrai
      POSTGRES_USER: orchestrai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrai"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  orchestrai:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://orchestrai:${POSTGRES_PASSWORD:-changeme}@postgres:5432/orchestrai
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD_SMTP:-}

volumes:
  pgdata:
